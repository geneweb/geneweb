name: Geneweb Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: true
      tag_name:
        description: 'Tag name'
        required: true
        type: string

env:
  DUNE_PROFILE: "release"
  OPAMYES: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            ocaml-version: 5.4.0
            platform: macos-arm64
            is-unix: true
          - os: macos-15-intel
            ocaml-version: 5.4.0
            platform: macos-intel
            is-unix: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-version }}

      - name: Install Perl dependencies and remove locked mingw gcc shim (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cpan -j .github/ci-config/cpan-config.pm -T -f -i String::ShellQuote IPC::System::Simple;
          rm -f _opam/bin/x86_64-w64-mingw32-gcc.exe || true
          rm -f _opam/bin/i686-w64-mingw32-gcc.exe || true

      - name: Install dependencies
        run: |
          opam install . --deps-only
          ${{ matrix.is-unix && 'opam install ancient' || '' }}

      - name: Force static GMP linking (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Zarith is installed with dynamic linking, hide ALL libgmp DLLs
          find /usr -name "libgmp-10.dll" -exec mv {} {}.hidden \; 2>/dev/null || true
          find /usr -name "libgmp.dll.a" -exec mv {} {}.hidden \; 2>/dev/null || true
          OPAM_PREFIX=$(opam var prefix | tr '\\' '/')
          find "$OPAM_PREFIX" -name "libgmp-10.dll" -exec mv {} {}.hidden \; 2>/dev/null || true
          
          # Reinstall zarith WITHOUT depext (won’t reinstall system packages)
          echo "Reinstalling zarith with static GMP…"
          OPAMASSUMEDEPEXTS=true opam reinstall zarith --yes
          echo "Static GMP linking configured"

      - name: Configure and build Geneweb
        run: |
          opam exec -- ocaml ./configure.ml --sosa-zarith ${{ matrix.is-unix && '--gwd-caching' || '' }}
          opam exec -- make distrib distrib-rpc

      - name: Verify static linking (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "=== Checking executable dependencies ==="
          cd distribution/gw
          ldd gwd.exe

          NON_WINDOWS=$(ldd gwd.exe | grep -v -F /cygdrive/c/Windows/ || true)
          if [ -n "$NON_WINDOWS" ]; then
            echo "❌ ERROR: Non-Windows dependencies found:"
            echo "$NON_WINDOWS"
            exit 1
          else
            echo "✅ SUCCESS: libgmp is statically linked (all dependencies are statically linked or from Windows)"
          fi

      - name: Minify RPC client with terser
        shell: bash
        working-directory: distribution/gw/etc/js
        run: |
          npm install -g terser
          chmod +w rpc_client.min.js
          terser rpc_client.min.js -o rpc_client.min.js --compress --mangle
          gzip -9 -k -f rpc_client.min.js
      
      - name: Create macOS bundle and DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "🍎 Creating macOS bundle and DMG..."
          
          chmod +x create_bundle.sh create_dmg.sh
          
          ./create_bundle.sh
          ./create_dmg.sh
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          
          DMG_NAME="GeneWeb-${VERSION}.dmg"
          
          if [ -f "$DMG_NAME" ]; then
            mv "$DMG_NAME" distribution/
            mv "${DMG_NAME}.sha256" distribution/
            echo "✅ DMG: $DMG_NAME"
            ls -lh "distribution/$DMG_NAME"
          fi
      
      - name: Create release archive
        shell: bash
        working-directory: distribution
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          
          # Strip leading 'v' from version for archive naming
          VERSION="${VERSION#v}"
          
          VERSIONED_ARCHIVE="geneweb-${VERSION}-${{ matrix.platform }}.zip"
          
          if [[ "$RUNNER_OS" == "macOS" ]] && [[ -f "GeneWeb-${VERSION}.dmg" ]]; then
            echo "DMG_EXISTS=true" >> $GITHUB_ENV
            echo "DMG_NAME=GeneWeb-${VERSION}.dmg" >> $GITHUB_ENV
            echo "DMG_SHA256=GeneWeb-${VERSION}.dmg.sha256" >> $GITHUB_ENV
          fi
          
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a -tzip "../${VERSIONED_ARCHIVE}" * -mx=9
          else
            zip -9 -r "../${VERSIONED_ARCHIVE}" *
          fi
          
          echo "VERSIONED_ARCHIVE=${VERSIONED_ARCHIVE}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: |
            ${{ env.VERSIONED_ARCHIVE }}
            ${{ "$RUNNER_OS" == 'macOS' && env.DMG_EXISTS == 'true' && format('distribution/{0}', env.DMG_NAME) || '' }}
            ${{ "$RUNNER_OS" == 'macOS' && env.DMG_EXISTS == 'true' && format('distribution/{0}', env.DMG_SHA256) || '' }}
          fail_on_unmatched_files: true
          
          prerelease: ${{ (github.event_name == 'workflow_dispatch' && inputs.prerelease) || contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') }}
          draft: false
          name: "GeneWeb ${{ env.VERSION }}"
          body: |
            ${{ contains(env.VERSION, 'alpha') && '⚠️ **Alpha release** - Not for production use' || '' }}
            ${{ contains(env.VERSION, 'beta') && '⚠️ **Beta release** - Testing recommended' || '' }}
            ${{ contains(env.VERSION, 'rc') && '✅ **Release candidate** - Production ready pending final validation' || '' }}
            
            ## 📥 Downloads
            
            ### macOS Installer (Recommended)
            
            | File | Description | Size |
            |------|-------------|------|
            | [🍎 **GeneWeb-${{ env.VERSION }}.dmg**](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/GeneWeb-${{ env.VERSION }}.dmg) | **One-click installer** for macOS (Apple Silicon & Intel)<br/>✅ No dependencies needed<br/>✅ Includes GMP library<br/>✅ Auto-installer script | ~250 MB |
            
            ### Platform Archives (Advanced users)
            
            | Platform | Archive | Requirements |
            |----------|---------|--------------|
            | 🐧 **Linux** | [geneweb-${{ env.VERSION }}-linux.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/geneweb-${{ env.VERSION }}-linux.zip) | glibc 2.35+, `libgmp10` |
            | 🍎 **macOS (Apple Silicon)** | [geneweb-${{ env.VERSION }}-macos-arm64.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/geneweb-${{ env.VERSION }}-macos-arm64.zip) | `gmp` via Homebrew |
            | 🍎 **macOS (Intel)** | [geneweb-${{ env.VERSION }}-macos-intel.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/geneweb-${{ env.VERSION }}-macos-intel.zip) | `gmp` via Homebrew |
            | 🪟 **Windows** | [geneweb-${{ env.VERSION }}-windows.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/geneweb-${{ env.VERSION }}-windows.zip) | None (GMP included) |
            
            ## 📖 Installation
            
            <details>
            <summary><b>ZIP Archives</b></summary>

            **Prerequisites:**
            ```bash
            # Ubuntu/Debian
            sudo apt-get install libgmp10
            
            # macOS
            brew install gmp
            ```

            **Installation:**
            1. Extract the downloaded archive
            2. Run `./gwd` (Unix) or `gwd.exe` (Windows)
            3. Open http://127.0.0.1:2317 in your browser
            </details>

            <details>
            <summary><b>macOS DMG (One-click installer)</b></summary>

            1. Download `GeneWeb-${{ env.VERSION }}.dmg`
            2. Open the DMG
            3. Double-click **"GeneWeb_install.command"**
            4. Follow the on-screen instructions

            **First launch:** macOS will show a security warning:
            - Go to **System Preferences** → **Privacy & Security**
            - Click **"Open Anyway"** next to the GeneWeb message
            - Launch GeneWeb from Applications

            **To verify the download:**
            ```bash
            shasum -a 256 -c GeneWeb-${{ env.VERSION }}.dmg.sha256
            ```
            </details>

